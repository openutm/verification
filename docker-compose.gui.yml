# Docker Compose for OpenUTM Verification GUI Mode
#
# Usage:
#   Production mode (built frontend):
#     docker compose -f docker-compose.gui.yml up --build
#
#   Development mode (hot-reload for both frontend and backend):
#     docker compose -f docker-compose.gui.yml --profile dev up --build
#
# Access the GUI at http://localhost:8989 (production) or http://localhost:5173 (dev)

services:
  # =============================================================================
  # Production Service - Single container serving both backend and frontend
  # =============================================================================
  verification-gui:
    image: openutm/verification-gui:latest
    container_name: openutm-verification-gui
    profiles: ["", "prod"]
    build:
      context: .
      dockerfile: Dockerfile.gui
      args:
        UV_COMPILE_BYTECODE: 1
        UV_LINK_MODE: copy
        APP_USER: appuser
        APP_GROUP: appgrp
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    environment:
      # Config & Logging
      - OPENUTM_CONFIG_PATH=${OPENUTM_CONFIG_PATH:-/app/config/default.yaml}
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Flight Blender (override endpoint if needed)
      - FLIGHT_BLENDER_URL=${FLIGHT_BLENDER_URL:-http://host.docker.internal:8000}
    ports:
      - "8989:8989"
    # Volume mounts:
    #   - config: YAML config files (read-write so the GUI Settings screen
    #     can persist edits via PUT /api/config back to default.yaml)
    #   - reports: Generated reports (read-write, persists across restarts)
    #   - scenarios: YAML scenario definitions (read-write so users can add/edit scenarios)
    #
    # For Kubernetes: Use ConfigMap for config, PersistentVolumeClaim for reports
    volumes:
      - ./config:/app/config:rw
      - ./reports:/app/reports:rw
      - ./scenarios:/app/scenarios:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "project=openutm-verification"
      - "component=verification-gui"
      - "mode=production"
    # Access the GUI at http://localhost:8989
    # Reports available at http://localhost:8989/reports/{timestamp}/report.html

  # =============================================================================
  # Development Services - Separate backend and frontend with hot-reload
  # =============================================================================

  # Backend API server with hot-reload (Python)
  # Watches src/ for changes and automatically reloads
  # Mounts config files for configuration management
  # Reports directory is writable so scenario runs persist data
  verification-backend-dev:
    image: openutm/verification-backend-dev:latest
    container_name: openutm-verification-backend-dev
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        APP_USER: appuser
        APP_GROUP: appgrp
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    environment:
      # Config & Logging
      - OPENUTM_CONFIG_PATH=${OPENUTM_CONFIG_PATH:-/app/config/default.yaml}
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      # Flight Blender
      - FLIGHT_BLENDER_URL=${FLIGHT_BLENDER_URL:-http://host.docker.internal:8000}
      # Hot-reload flag
      - UVICORN_RELOAD=true
    ports:
      - "8989:8989"
    # Volume mounts for development:
    #   - src: Python source code (hot-reload via uvicorn --reload)
    #   - config: YAML config files (read-write so the Settings screen
    #     can persist edits via PUT /api/config)
    #   - reports: Generated reports (writable, persists)
    #   - scenarios: Scenario YAML files (read-write so devs can add/edit scenarios without rebuilding)
    #   - docs: Documentation (mounted for reference)
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:rw
      - ./reports:/app/reports:rw
      - ./scenarios:/app/scenarios:rw
      - ./docs:/app/docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python -m uvicorn openutm_verification.server.main:app
      --host 0.0.0.0 --port 8989 --reload
      --reload-dir /app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "project=openutm-verification"
      - "component=verification-backend"
      - "mode=development"
    # Backend API at http://localhost:8989
    # Reports at http://localhost:8989/reports/{timestamp}/report.html

  # Frontend dev server with hot-reload (React + Vite)
  # Proxies all API calls to verification-backend-dev:8989
  # Hot-reloads React components as you edit them
  # VITE_BACKEND_URL controls where API requests are proxied to (container networking)
  verification-frontend-dev:
    image: node:20-slim
    container_name: openutm-verification-frontend-dev
    profiles: ["dev"]
    working_dir: /app
    environment:
      # Dev environment
      - NODE_ENV=development
      # Backend URL for Vite proxy (container hostname:port)
      - VITE_BACKEND_URL=http://verification-backend-dev:8989
    ports:
      - "5173:5173"
    # Volume mounts:
    #   - web-editor: Source code (mutable, hot-reload via Vite)
    #   - web-editor-node-modules: Persistent node_modules (avoids reinstall)
    volumes:
      - ./web-editor:/app:rw
      - web-editor-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      verification-backend-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      - "project=openutm-verification"
      - "component=verification-frontend"
      - "mode=development"
    # Access Vite dev server at http://localhost:5173
    # API requests proxied to backend at http://verification-backend-dev:8989

volumes:
  web-editor-node-modules:
    name: openutm-web-editor-node-modules
