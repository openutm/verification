name: daa_a3_overtake_cooperative
description: >
  ASTM F3442 Category A3 - Overtake from Behind (Cooperative).
  Verifies detection when a faster intruder overtakes ownship from behind.
  Both aircraft heading East (090°) along 53.6200°N. Ownship at ~15 m/s,
  intruder (Cirrus SR22) at 117 kts from 3.5 km behind. Closure rate ~45 m/s.
  CPA at minimum horizontal separation as intruder passes.
  Edmonton Area A (rural), 7m vertical offset (100m vs 107m AGL).

steps:
  - step: Check AMQP Connection
  - step: Cleanup Flight Declarations
  - step: Setup Flight Declaration
    arguments:
      flight_declaration_path: config/edmonton/flight_declaration_a3_overtake.json
      trajectory_path: config/edmonton/trajectory_a3_overtake_ownship.json
      telemetry_duration: 110
      altitude_m: 120
  - step: Start AMQP Queue Monitor
    arguments:
      routing_key: ${{ steps.Setup Flight Declaration.result.id }}
      duration: 150
    background: true
  - step: Update Operation State
    arguments:
      state: ACTIVATED
  - id: stream_a3_traffic
    step: Stream Air Traffic
    arguments:
      provider: bluesky
      config_path: config/edmonton/bluesky_a3_overtake.scn
      duration: 120
    background: true
  - id: wait_traffic_start
    step: Wait X seconds
    arguments:
      duration: 5
  - step: Submit Telemetry
    arguments:
      duration: 115
    background: true
  - id: update_state_ended
    step: Update Operation State
    arguments:
      state: ENDED
    needs:
      - Submit Telemetry
      - stream_a3_traffic
  - step: Stop AMQP Queue Monitor
    needs:
      - update_state_ended
  - id: get_daa_active_alerts
    step: Get Active DAA Alerts
  - id: get_daa_incident_logs
    step: Get DAA Incident Logs
    arguments:
      start_date: ${{ steps.Setup Flight Declaration.result.start_datetime }}

  - step: Get AMQP Messages
    arguments:
      routing_key_filter: ${{ steps.Setup Flight Declaration.result.id }}

  # Schema validation: checks API payloads have required fields and correct types
  - step: Verify DAA ASTM F3442 API Compliance
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      min_incident_logs: 1
      require_alert_events: true
      require_periodic_updates: true

  # A3 pass criteria: overtake geometry detection, CPA, lifecycle, escalation
  - step: Verify DAA Encounter Criteria
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      expected_alert_levels: [1, 2, 3]
      expected_geometry: overtake
      max_1hz_gap_seconds: 3.0  # Overtake has longer encounter; rare Celery gaps up to ~2.9s observed
