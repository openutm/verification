name: daa_a1_head_on_cooperative
description: >
  ASTM F3442 Category A1 - Head-On Cooperative Encounter.
  Verifies basic detection, alert escalation, CPA logging, and 1Hz incident logging
  for a head-on geometry with a cooperative intruder (Cessna 172, ADS-B Out).
  Edmonton Area B (suburban), ~4.2 km initial separation, 22m vertical offset.

steps:
  - step: Check AMQP Connection
  - step: Cleanup Flight Declarations
  - step: Setup Flight Declaration
    arguments:
      flight_declaration_path: config/edmonton/flight_declaration_a1_head_on.json
      trajectory_path: config/edmonton/trajectory_a1_head_on_ownship.json
      altitude_m: 120
      telemetry_duration: 95
  - step: Start AMQP Queue Monitor
    arguments:
      routing_key: ${{ steps.Setup Flight Declaration.result.id }}
      duration: 130
    background: true
  - step: Update Operation State
    arguments:
      state: ACTIVATED
  - id: stream_a1_traffic
    step: Stream Air Traffic
    arguments:
      provider: bluesky
      config_path: config/edmonton/bluesky_a1_head_on.scn
      duration: 100
    background: true
  - id: wait_traffic_start
    step: Wait X seconds
    arguments:
      duration: 5
  - step: Submit Telemetry
    arguments:
      duration: 95
    background: true
  - id: update_state_ended
    step: Update Operation State
    arguments:
      state: ENDED
    needs:
      - Submit Telemetry
      - stream_a1_traffic
  - step: Stop AMQP Queue Monitor
    needs:
      - update_state_ended
  - id: get_daa_active_alerts
    step: Get Active DAA Alerts
  - id: get_daa_incident_logs
    step: Get DAA Incident Logs
    arguments:
      start_date: ${{ steps.Setup Flight Declaration.result.start_datetime }}

  - step: Get AMQP Messages
    arguments:
      routing_key_filter: ${{ steps.Setup Flight Declaration.result.id }}

  # Schema validation: checks API payloads have required fields
  - step: Verify DAA ASTM F3442 API Compliance
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      min_incident_logs: 1
      require_alert_events: true
      require_periodic_updates: true

  # A1 pass criteria: monotonic escalation, CPA accuracy, 1Hz logging, lifecycle, geometry
  - step: Verify DAA Encounter Criteria
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      expected_alert_levels: [1, 2, 3]
      expected_geometry: head_on
      max_1hz_gap_seconds: 2.0  # Relaxed from 1.0s: Celery Beat has inherent scheduling jitter
