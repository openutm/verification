name: daa_b1_multi_intruder_cooperative
description: >
  ASTM F3442 Category B1 - Two Intruders, Different Directions (Cooperative).
  Verifies handling of simultaneous intruders approaching from opposite bearings.
  Ownship hovering at 53.5300°N, -113.5600°W, 120m AGL.
  Intruder 1 (Cessna 172) from North at 40 m/s (78 kts), 130m AGL.
  Intruder 2 (Bell 206) from South at 30 m/s (58 kts), 110m AGL.
  Initial separations: ~4.0 km (north), ~3.5 km (south).
  Expects two distinct ProximityAlert records with independent lifecycle.
  Edmonton flight area (within inclusion zone, outside all exclusion zones).

steps:
  - step: Check AMQP Connection
  - step: Cleanup Flight Declarations
  - step: Setup Flight Declaration
    arguments:
      flight_declaration_path: config/edmonton/flight_declaration_b1_multi_intruder.json
      trajectory_path: config/edmonton/trajectory_b1_multi_intruder_ownship.json
      telemetry_duration: 140
      altitude_m: 120
  - step: Start AMQP Queue Monitor
    arguments:
      routing_key: ${{ steps.Setup Flight Declaration.result.id }}
      duration: 180
    background: true
  - step: Update Operation State
    arguments:
      state: ACTIVATED
  - id: stream_b1_traffic
    step: Stream Air Traffic
    arguments:
      provider: bluesky
      config_path: config/edmonton/bluesky_b1_multi_intruder.scn
      duration: 150
    background: true
  - id: wait_traffic_start
    step: Wait X seconds
    arguments:
      duration: 5
  - step: Submit Telemetry
    arguments:
      duration: 140
    background: true
  - id: update_state_ended
    step: Update Operation State
    arguments:
      state: ENDED
    needs:
      - Submit Telemetry
      - stream_b1_traffic
  - step: Stop AMQP Queue Monitor
    needs:
      - update_state_ended
  - id: get_daa_active_alerts
    step: Get Active DAA Alerts
  - id: get_daa_incident_logs
    step: Get DAA Incident Logs
    arguments:
      start_date: ${{ steps.Setup Flight Declaration.result.start_datetime }}

  - step: Get AMQP Messages
    arguments:
      routing_key_filter: ${{ steps.Setup Flight Declaration.result.id }}

  # Schema validation: checks API payloads have required fields and correct types
  - step: Verify DAA ASTM F3442 API Compliance
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      min_incident_logs: 2
      require_alert_events: true
      require_periodic_updates: true

  # B1 pass criteria: multi-intruder detection, independent lifecycle, escalation
  - step: Verify DAA Encounter Criteria
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      expected_alert_levels: [1, 2, 3]
      expected_geometry: any
      max_1hz_gap_seconds: 3.0  # Two intruders increase Celery load; allow for scheduling jitter
