name: daa_a2_crossing_cooperative
description: >
  ASTM F3442 Category A2 - Crossing Trajectory Cooperative Encounter.
  Verifies detection for perpendicular crossing geometry with a cooperative
  intruder (Piper PA-28, Mode C). Ownship starts south of intruder path at
  53.5475°N heading North at ~12 m/s, intruder heading East at 53.5500°N
  from 2.9 km west at ~77 m/s. Ownship converges toward crossing point.
  CPA ~110m horizontal at T+32s. Edmonton Area B (suburban), 13m vertical offset.

steps:
  - step: Check AMQP Connection
  - step: Cleanup Flight Declarations
  - step: Setup Flight Declaration
    arguments:
      flight_declaration_path: config/edmonton/flight_declaration_a2_crossing.json
      trajectory_path: config/edmonton/trajectory_a2_crossing_ownship.json
      telemetry_duration: 80
      altitude_m: 120
  - step: Start AMQP Queue Monitor
    arguments:
      routing_key: ${{ steps.Setup Flight Declaration.result.id }}
      duration: 110
    background: true
  - step: Update Operation State
    arguments:
      state: ACTIVATED
  - id: stream_a2_traffic
    step: Stream Air Traffic
    arguments:
      provider: bluesky
      config_path: config/edmonton/bluesky_a2_crossing.scn
      duration: 85
    background: true
  - id: wait_traffic_start
    step: Wait X seconds
    arguments:
      duration: 5
  - step: Submit Telemetry
    arguments:
      duration: 90
    background: true
  - id: update_state_ended
    step: Update Operation State
    arguments:
      state: ENDED
    needs:
      - Submit Telemetry
      - stream_a2_traffic
  - step: Stop AMQP Queue Monitor
    needs:
      - update_state_ended
  - id: get_daa_active_alerts
    step: Get Active DAA Alerts
  - id: get_daa_incident_logs
    step: Get DAA Incident Logs
    arguments:
      start_date: ${{ steps.Setup Flight Declaration.result.start_datetime }}

  - step: Get AMQP Messages
    arguments:
      routing_key_filter: ${{ steps.Setup Flight Declaration.result.id }}

  # Schema validation: checks API payloads have required fields and correct types
  - step: Verify DAA ASTM F3442 API Compliance
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      min_incident_logs: 1
      require_alert_events: true
      require_periodic_updates: true

  # A2 pass criteria: crossing geometry detection, CPA, lifecycle, escalation
  - step: Verify DAA Encounter Criteria
    arguments:
      incident_logs: ${{ steps.get_daa_incident_logs.result }}
      active_alerts: ${{ steps.get_daa_active_alerts.result }}
      expected_alert_levels: [1, 2, 3]
      expected_geometry: crossing
      max_1hz_gap_seconds: 2.0  # Relaxed from 1.0s: Celery Beat has inherent scheduling jitter
