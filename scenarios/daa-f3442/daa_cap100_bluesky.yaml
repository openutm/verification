name: daa_cap100_bluesky
description: >
  DAA capacity test with 100 ownships and 10 BlueSky intruders (ASTM F3442 §7.3.1).
  100 ownships loiter in a 10×10 grid (53.504–53.576°N, -113.584 to -113.476°W)
  while 10 BlueSky intruders on defined paths cross through the grid
  from cardinal and diagonal directions.
  Intruder altitudes 370–430 ft bracket the ownship altitude of 394 ft (120m).

