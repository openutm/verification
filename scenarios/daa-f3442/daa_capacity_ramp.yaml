  # ─── Phase 1: 50 intruders (t=0, runs for full 300s) ────────────
  - id: stream_phase_1
    step: Stream Air Traffic
    arguments:
      provider: bayesian
      config_path: config/edmonton/cap20/trajectory_cap_intruder_area.json
      number_of_aircraft: 50
      duration: 300
    background: true

  # ─── Phase 2: +50 intruders at t=60 (runs 240s) ─────────────────
  - id: wait_phase_2
    step: Wait X seconds
    arguments:
      duration: 60
  - id: stream_phase_2
    step: Stream Air Traffic
    arguments:
      provider: bayesian
      config_path: config/edmonton/cap20/trajectory_cap_intruder_area.json
