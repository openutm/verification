name: daa_capacity_ramp
description: >
  DAA Detection Function capacity ramp-up test (ASTM F3442 §7.3.1).
  20 ownships loiter in a 5×4 grid while intruders ramp through 4 phases:
  Phase 1 (t=0):   50 intruders  →  1,000 pairs
  Phase 2 (t=60): +50 intruders  →  2,000 pairs
  Phase 3 (t=120): +100 intruders → 4,000 pairs
  Phase 4 (t=180): +300 intruders → 10,000 pairs
  Measurement: processing_latency_ms from IncidentLog periodic_update entries.

steps:
  # ─── Preflight ─────────────────────────────────────────────────
  - step: Check AMQP Connection
  - step: Cleanup Flight Declarations

  # ─── Create 20 synchronized ownship declarations ────────────────
  - id: setup_ownships
    step: Setup Multiple Flight Declarations With Paths
    arguments:
      declaration_paths:
        - config/edmonton/cap20/flight_declaration_cap_ownship_01.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_02.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_03.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_04.json
