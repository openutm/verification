        - config/edmonton/cap20/flight_declaration_cap_ownship_14.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_15.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_16.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_17.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_18.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_19.json
        - config/edmonton/cap20/flight_declaration_cap_ownship_20.json
      duration_minutes: 15

  - step: Start AMQP Queue Monitor
    arguments:
      routing_key: "#"
      duration: 600
    background: true

  # ─── Activate all 20 ownships ────────────────────────────────────
