name: sdsp_track
description: Runs the SDSP track scenario.
steps:
- step: Generate UUID
- id: start_sdsp_session
  step: Start SDSP Session
  arguments:
    session_id: ${{ steps.Generate UUID.result }}
- id: stream_air_traffic
  step: Stream Air Traffic
  arguments:
    provider: geojson
    target: flight_blender
  background: true
- id: wait_2_seconds
  step: Wait X seconds
  arguments:
    duration: 2
- step: Verify SDSP Track
  arguments:
    expected_track_interval_seconds: 1
    expected_track_count: 3
    session_id: ${{ steps.Generate UUID.result }}
- id: wait_5_seconds
  step: Wait X seconds
  arguments:
    duration: 5
- id: stop_sdsp_session
  step: Stop SDSP Session
  arguments:
    session_id: ${{ steps.Generate UUID.result }}
  needs:
  - stream_air_traffic
