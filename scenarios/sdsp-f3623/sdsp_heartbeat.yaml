name: sdsp_heartbeat
description: Runs the SDSP heartbeat scenario.

steps:
  - step: Generate UUID

  - id: start_session
    step: Start / Stop SDSP Session
    arguments:
      action: START
      surveillance_session_id: ${{ steps.Generate UUID.result }}

  - step: Wait X seconds
    arguments:
      duration: 2

  - step: Verify SDSP Heartbeat
    arguments:
      surveillance_session_id: ${{ steps.Generate UUID.result }}
      expected_heartbeat_interval_seconds: 1
      expected_heartbeat_count: 3

  - id: wait_verification
    step: Wait X seconds
    arguments:
      duration: 5

  - step: Start / Stop SDSP Session
    arguments:
      action: STOP
      surveillance_session_id: ${{ steps.Generate UUID.result }}
